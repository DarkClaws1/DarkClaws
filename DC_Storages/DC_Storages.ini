[Metadata]
Name=Dark Claws
Author=Andy
Information=
Version=

[Rainmeter]
Update=1000
SkinWidth = #SkinWidth#
SkinHeight = #SkinHeight#
ContextTitle = Settings.inc
ContextAction = ["#Settings#"]
ContextTitle2 = Open HWiNFO64
ContextAction2 = ["C:\ProgramData\Microsoft\Windows\Start Menu\Programs\HWiNFO64\HWiNFO64"]

[Variables]
@Include1 = #@#style.inc
@Include2 = Settings.inc
drives = 4

[MeterBG]
Meter = Shape
MeterStyle = styleBG

[driveName]
X = (#SkinWidth# * 0.0)
Y = (#RowOffset# - #BarY#)r
StringAlign= left
FontSize = #FontSize#

[driveTemp]
X = #TempX#
Y = r
FontSize = #FontSize#

[driveUsed]
X = #UsedX#
Y = r
AutoScale = 1
NumOfDecimals = 2
Text= %1B / %2B
StringAlign= right
FontSize = #FontSize#

[driveBar]
X = #BarX#
Y = #BarY#r
W = #BarW#
H = #BarH# 
BarColor = #hlColor#
SolidColor = #bgColor#
BarOrientation = Horizontal


;=============================================

[MeterDrive1]
Meter=String
MeterStyle = styleText | driveName
Y = #Row1#
Text = #disk1#
Hidden = ([MeasureUsed1] = 0)

[MeterDrive1Temp]
MeasureName = MeasureTemp1
Meter=String
MeterStyle = styleText | driveTemp
Hidden = ([MeasureUsed1] = 0)

[MeterDrive1Used]
MeasureName = MeasureUsed1
MeasureName2 = MeasureTotal1
Meter=String
MeterStyle = styleText | driveUsed
Hidden = ([MeasureUsed1] = 0)

[MeterBarUsed1]
MeasureName = MeasurePercentUsed1
Meter = Bar
MeterStyle = driveBar
Hidden = ([MeasureUsed1] = 0)

;=============================================
[MeterDrive2]
Meter=String
MeterStyle = styleText | driveName
Text = #disk2#
Hidden = ([MeasureUsed2] = 0)

[MeterDrive2Temp]
