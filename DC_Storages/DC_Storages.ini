[MeterSettings]
Meter = Image
MeterStyle = Settings

;=============================
;	SKIN CHANGE BUTTONS
;=============================
[MeterButton1]
Meter=String
MeterStyle = BoxButton
Y = (#SkinHeight# * 0.2)

[MeterButton2]
Meter=String
MeterStyle = BoxButton

[MeterButton3]
Meter=String
MeterStyle = BoxButton

[MeterButton4]
Meter=String
MeterStyle = BoxButton

[MeterCurrentButton]
Meter = String
Text=g
X = r
Y = ((#SkinHeight# * 0.2) + (#SkinHeight# * 0.2) * (#drives# - 1))
FontFace=Webdings
FontSize=(10.2 * #scale#)
StringAlign = Right
FontColor=#hlColor#