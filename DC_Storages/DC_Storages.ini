MeterStyle = styleText | driveName
Text = #disk3#
Hidden = ([MeasureUsed3] = 0)

[MeterDrive3Temp]
MeasureName = MeasureTemp3
Meter=String
MeterStyle = styleText | driveTemp
Hidden = ([MeasureUsed3] = 0)

[MeterDrive3Used]
MeasureName = MeasureUsed3
MeasureName2 = MeasureTotal3
Meter=String
MeterStyle = styleText | driveUsed
Hidden = ([MeasureUsed3] = 0)

[MeterBarUsed3]
