Meter=String
MeterStyle = styleText | driveTemp
Hidden = ([MeasureUsed2] = 0)

[MeterDriveDUsed]
MeasureName = MeasureUsed2
MeasureName2 = MeasureTotal2
Meter=String
MeterStyle = styleText | driveUsed
Hidden = ([MeasureUsed2] = 0)

[MeterBarUsed2]
MeasureName = MeasurePercentUsed2
Meter = Bar
MeterStyle = driveBar
Hidden = ([MeasureUsed2] = 0)

;=============================================
