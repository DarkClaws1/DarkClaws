[Metadata]
Name=Dark Claws
Author=Andy
Information=
Version=

[Rainmeter]
Update=1000
SkinWidth = #SkinWidth#
SkinHeight = #SkinHeight#

[Variables]
@Include1 = #@#style.inc
@Include2 = Settings.inc
FontSize = 12

[MeterBG]
Meter = Shape
MeterStyle = styleBG

[MeasureEscape]
Measure = Plugin
Plugin = HotKey
HotKey = ESCAPE
KeyDownAction =[!ActivateConfig #CURRENTCONFIG# "[MeasureConfig].ini"]

[InfoLine]
X = (#SkinWidth# * 0.5)
Y = (#SkinHeight# * 0.2)r
W = #SkinWidth#
StringAlign = Center
FontSize = 12


[Line1]
Meter = String
MeterStyle = styleText | InfoLine
Y = (#SkinHeight# * 0)
Text = In HWInfo, click the Gear at the bottom

[Line2]
Meter = String
MeterStyle = styleText | InfoLine
Text =  HWiNFO Gadget tab -> Enable reporting to Gadget

[Line3]
Meter = String
MeterStyle = styleText | InfoLine
Text = Scroll to find the Drive Temperatures

[Line4]
Meter = String
MeterStyle = styleText | InfoLine
Text = "Report Value in Gadget " and then read the Index

[Line5]
Meter = String
MeterStyle = styleText | InfoLine
Text = Click here to add the Indexes
FontColor = #clColor#
LeftMouseUpAction=!Execute  [!ActivateConfig "#CURRENTCONFIG#" "#Editor#"]


[MeterClose]
Meter=Shape
MeterStyle = CloseButton | CloseWindow


