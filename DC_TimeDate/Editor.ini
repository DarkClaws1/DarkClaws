[Rainmeter]
AccurateText=1
SkinWidth = #SkinWidth#
SkinHeight = #SkinHeight#

[Metadata]
Name=Dark Claws
Author=Andy
ContextTitle = Settings.inc
ContextAction = ["#Settings#"]

[Variables]
@Include  = #@#style.inc
@Include2 = Settings.inc
@Include3 = #@#EditorSettings.inc
BoxH = (#SkinHeight# * 0.3)


[MeterHotkey]
Meter = String
MeterStyle = styleText
X = (#SkinWidth# * 0.5)
Y = (#SkinHeight# * 0.08)
Fontsize = (22 * #scale#)
StringAlign = Center
Text = Live Caption Hotkey

[MeterHotKeyBox]
Meter = Shape
Shape = Rectangle 0,0,(#SkinWidth# * 0.2),#BoxH# | Fill Color #bgColor# | StrokeWidth #stroke# | Stroke Color #olColor#
X = (#SkinWidth# * 0.4)
Y = (#SkinWidth# * 0.15)

[ToggleKey]
Meter=String
MeterStyle = styleText | styleInput
X = (#SkinWidth# * 0.1)r
Y = (#SkinHeight# * 0.0)r
W = (#SkinWidth# * 0.2)
H = #BoxH#

[MeasureEscape]
Measure=Plugin
Plugin=HotKey
HotKey=ESCAPE
KeyDownAction=[!ActivateConfig #CURRENTCONFIG#]